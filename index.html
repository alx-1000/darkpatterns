<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Pattern Simulator</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --border: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #64748b;
      --danger: #fb923c;
      --success: #cbd5e1;
      --warning: #fbbf24;
      --card: #111827;
      --shadow: 0 12px 30px rgba(2,6,23,0.35);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617 0%, #111827 100%);
      color: var(--text);
    }
    button, .card {
      font: inherit;
    }
    .top-bar {
      display: none;
    }
    .stat-pill {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: var(--shadow);
    }
    .stat-pill strong {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
    }
    .stat-pill .value {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 24px;
    }
    .branch-shell {
      padding: 24px 24px 0;
    }
    .branch-panel {
      display: grid;
      gap: 18px;
    }
    .branch-layout {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(300px, 1fr);
      gap: 18px;
      align-items: start;
    }
    .branch-left {
      display: grid;
      gap: 12px;
    }
    .branch-right {
      display: grid;
    }
    .branch-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .branch-card h3 {
      margin: 0;
      font-size: 1rem;
    }
    .branch-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .branch-option {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .branch-option:hover {
      transform: translateY(-1px);
    }
    .branch-option.active {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }
    .branch-preview {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 20px;
      display: grid;
      gap: 14px;
      color: #0f172a;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,0.12);
    }
    .branch-preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .branch-preview-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .branch-preview-card {
      border: 1px solid #dbe3ea;
      border-radius: 20px;
      padding: 18px;
      display: grid;
      gap: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
    }
    .branch-preview-card .preview-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .branch-preview-card .preview-tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 800;
      font-size: 0.8rem;
    }
    .branch-preview-card .preview-subtle {
      color: #64748b;
      font-size: 0.9rem;
    }
    .branch-preview-card .product-title {
      margin: 0;
      font-size: 1.2rem;
    }
    .branch-preview-card .price-row {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
    }
    .branch-preview-card .price-main {
      font-size: 1.7rem;
      font-weight: 800;
      color: #0f172a;
    }
    .branch-preview-card .price-original {
      text-decoration: line-through;
      color: #64748b;
      font-size: 0.95rem;
    }
    .branch-preview-card .promo-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .branch-preview-card .promo-badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 7px 10px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 700;
      font-size: 0.82rem;
    }
    .branch-preview-card .promo-badge.soft {
      background: #f1f5f9;
      color: #475569;
    }
    .branch-preview-card .preview-cta {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      background: #16a34a;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    .branch-score {
      grid-column: 1 / -1;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 12px;
      color: #0f172a;
    }
    .branch-score h3 {
      margin: 0;
      font-size: 1rem;
    }
    .branch-chart {
      display: grid;
      gap: 12px;
    }
    .branch-chart-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    .branch-chart-item {
      display: grid;
      gap: 8px;
      min-height: 180px;
    }
    .branch-chart-bar {
      height: 140px;
      background: #e2e8f0;
      border-radius: 14px;
      padding: 6px;
      display: flex;
      align-items: flex-end;
    }
    .branch-chart-fill {
      width: 100%;
      border-radius: 10px;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
      transition: height 0.25s ease;
    }
    .branch-chart-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #334155;
      text-align: center;
    }
    .branch-chart-value {
      font-size: 0.9rem;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
    }
    .branch-score-note {
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .branch-summary {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .branch-summary li {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 12px;
      color: #334155;
      font-size: 0.95rem;
    }
    .panel {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(2,6,23,0.25);
      padding: 20px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
      color: #e2e8f0;
    }
    .panel-sub {
      margin-bottom: 22px;
    }
    .section-note {
      margin: 0 0 16px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .status-grid {
      display: grid;
      gap: 16px;
    }
    .small-stat {
      display: grid;
      gap: 8px;
      padding: 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
    }
    .small-stat label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .small-stat .value {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .progress-bar {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      width: 0;
      transition: width 0.6s ease;
    }
    .ui-frame {
      background: #ffffff;
      border: 2px solid #2563eb;
      border-radius: 28px;
      padding: 22px;
      min-height: 540px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: inset 0 0 0 1px rgba(37,99,235,0.08);
    }
    .ui-frame::before {
      content: '実際に運用中のUI';
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
    }
    .product-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 24px;
      display: grid;
      gap: 16px;
      position: relative;
    }
    .option-preview {
      border: 1px dashed #94a3b8;
      border-radius: 22px;
      background: #f1f5f9;
      padding: 12px;
      min-height: 260px;
      display: grid;
      gap: 10px;
      position: relative;
    }
    .preview-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.05);
      width: fit-content;
    }
    .option-preview .product-card {
      margin: 0;
      border-color: #cbd5e1;
      box-shadow: none;
    }
    .product-card.large-button .primary-btn {
      padding: 18px 0;
      font-size: 1rem;
    }
    .product-card .top-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .product-card .tag {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .product-card .unsubscribe {
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 0.92rem;
      cursor: default;
    }
    .product-card .unsubscribe.small {
      font-size: 0.82rem;
      color: #475569;
    }
    .product-card h3 {
      margin: 0;
      font-size: 1.5rem;
    }
    .product-card p {
      margin: 0;
      color: #475569;
      line-height: 1.7;
    }
    .product-card .highlight-box {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #1e3a8a;
      font-weight: 700;
    }
    .product-card .toast {
      display: inline-flex;
      align-items: center;
      border-radius: 16px;
      padding: 10px 14px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 700;
      width: fit-content;
    }
    .product-card .review-stars {
      color: #f59e0b;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .product-card .popup {
      position: relative;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,0.15);
    }
    .product-card .popup .close {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      display: grid;
      place-items: center;
      color: #475569;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .product-card .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }
    .primary-btn {
      width: 100%;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 14px;
      padding: 14px 0;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
    }
    .purchase-btn {
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 16px 30px rgba(22,163,74,0.16);
    }
    .purchase-btn:hover {
      background: #15803d;
    }
    .button-choice {
      flex: 1;
      min-width: 120px;
      border: 1px solid #2563eb;
      border-radius: 14px;
      padding: 12px 16px;
      background: #ffffff;
      color: #2563eb;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }
    .button-choice:hover {
      background: #eff6ff;
    }
    .button-choice.secondary {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .button.primary {
      background: #2563eb;
      color: #ffffff;
    }
    .button.secondary {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .button:hover {
      transform: translateY(-1px);
    }
    .applied-list {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 18px;
    }
    .applied-list h3 {
      margin-top: 0;
      font-size: 1rem;
      color: #0f172a;
    }
    .applied-list ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }
    .applied-list li {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 14px;
      color: #334155;
      font-size: 0.95rem;
    }
    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 20px;
      justify-items: center;
      align-items: start;
    }
    .option-card {
      border: 1px solid #334155;
      border-radius: 22px;
      background: #0f172a;
      padding: 22px;
      display: grid;
      gap: 16px;
      width: 100%;
      max-width: 520px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .option-card:hover {
      transform: translateY(-4px);
      border-color: #2563eb;
      box-shadow: 0 20px 45px rgba(37,99,235,0.14);
    }
    .option-card:focus-visible {
      outline: 3px solid rgba(37,99,235,0.3);
      outline-offset: 2px;
    }
    .option-card .section-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .option-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .option-actions .hint {
      color: #475569;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .sim-panel {
      border: 1px solid #475569;
      border-radius: 26px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,0.16), 0 12px 24px rgba(2,6,23,0.12);
    }
    .selection-page {
      display: grid;
      gap: 10px;
      padding: 6px;
      color: #0f172a;
    }
    .selection-page .selection-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 2px;
      color: #334155;
      font-size: 0.9rem;
      font-weight: 800;
    }
    .selection-page .selection-list {
      display: grid;
      gap: 8px;
    }
    .selection-page .selection-item,
    .selection-page .ad-slot {
      border-radius: 18px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      box-shadow: 0 8px 16px rgba(15,23,42,0.08);
    }
    .selection-page .selection-item {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid #dbe3ea;
    }
    .selection-page .selection-item .item-thumb {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #64748b, #475569);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .selection-page .selection-item .item-body {
      flex: 1;
      min-width: 0;
    }
    .selection-page .selection-item .item-name {
      font-size: 0.92rem;
      font-weight: 800;
      color: #0f172a;
    }
    .selection-page .selection-item .item-price {
      font-size: 0.82rem;
      color: #475569;
      margin-top: 2px;
    }
    .selection-page .selection-item .select-pill {
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #f8fafc;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .selection-page .ad-slot {
      border: 1px dashed #94a3b8;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
      color: #7c2d12;
      justify-content: space-between;
    }
    .selection-page.mode-clear .ad-slot {
      border-style: solid;
      border-color: #f59e0b;
      background: linear-gradient(135deg, #fffbeb 0%, #fde68a 100%);
      box-shadow: 0 0 0 1px rgba(245,158,11,0.24);
    }
    .selection-page.mode-soft .ad-slot {
      border-style: dashed;
      border-color: #94a3b8;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }
    .selection-page .ad-slot .ad-badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      font-weight: 800;
    }
    .selection-page .ad-slot .ad-copy {
      font-size: 0.82rem;
      font-weight: 700;
      flex: 1;
      margin-left: 6px;
    }
    .selection-page .ad-slot .ad-note {
      font-size: 0.74rem;
      color: #92400e;
    }
    .option-preview {
      border: 1px dashed #94a3b8;
      border-radius: 22px;
      background: #f1f5f9;
      padding: 12px;
      min-height: 260px;
      display: grid;
      gap: 10px;
      position: relative;
    }
    .preview-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.05);
      width: fit-content;
    }
    .option-preview .product-card {
      margin: 0;
      border-color: #cbd5e1;
      box-shadow: none;
    }
    .option-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .option-desc {
      margin: 0;
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .option-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .button.primary {
      background: #2563eb;
      color: #ffffff;
    }
    .button.secondary {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .button:hover {
      transform: translateY(-1px);
    }
    .log-list {
      display: grid;
      gap: 14px;
    }
    .log-entry {
      padding: 14px;
      background: #f8fafc;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      color: #0f172a;
      line-height: 1.5;
    }
    .log-entry strong {
      display: block;
      margin-bottom: 6px;
      color: #1d4ed8;
      font-weight: 700;
    }
    .overlay,
    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 20px;
      background: rgba(15,23,42,0.4);
      z-index: 30;
    }
    .overlay.hidden,
    .modal.hidden {
      display: none;
    }
    .modal-card {
      width: min(760px, 100%);
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.18);
      border: 1px solid rgba(226,232,240,0.9);
    }
    .ab-title {
      font-size: 1.35rem;
      margin-bottom: 20px;
    }

      display: grid;
      gap: 14px;
    }

      padding: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: #f8fafc;
    }

    .ab-card p { margin: 0; color: var(--muted); }
    .winner { font-weight: 700; color: #15803d; }
    .message-card {
      width: min(800px, 100%);
      background: #ffffff;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.18);

      border: 1px solid rgba(226,232,240,0.9);
      max-height: 90vh;
      overflow: auto;
    }
    .message-card h3 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #111827;
    }
    .message-card p {
      margin: 16px 0 22px;
      color: #475569;
      line-height: 1.7;
    }
    .summary-grid {
      display: grid;
      gap: 18px;
      margin: 20px 0;
      grid-template-columns: 1fr 1fr;
    }
    .summary-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 18px;
    }
    .summary-card h4 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: #0f172a;
    }
    .summary-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .summary-list li {
      background: #ffffff;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
    }
    .highlight {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .flash-green { animation: flash-green 0.7s ease; }
    .flash-red { animation: flash-red 0.7s ease; }
    @keyframes flash-green {
      0% { color: var(--success); }
      50% { color: #4ade80; }
      100% { color: var(--text); }
    }
    @keyframes flash-red {
      0% { color: var(--danger); }
      50% { color: #fb7185; }
      100% { color: var(--text); }
    }
    @media (max-width: 1120px) {
      .main { grid-template-columns: 1fr; }
      .top-bar { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      .branch-layout { grid-template-columns: 1fr; }

    function t(key) {
      return (translations[currentLanguage] && translations[currentLanguage][key]) || translations.ja[key] || key;
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('darkPatternLang', lang);
      
      // Update all language buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      
      // Update all elements with data-text attribute
      document.querySelectorAll('[data-text]').forEach(el => {
        const key = el.dataset.text;
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      
      // Update all elements with data-html attribute
      document.querySelectorAll('[data-html]').forEach(el => {
        const key = el.dataset.html;
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });
      
      // Trigger game re-render if game exists
      if (window.game && window.game.render) {
        window.game.render();
      }
    }

    // Initialize language button listeners
    function initLanguageButtons() {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          setLanguage(btn.dataset.lang);
        });
      });
      
      // Set initial language state
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLanguage);
      });

  <script>
    const branchState = {
      subscription: 'clear',
      price: 'original',
      ad: 'distinct',
      timer: 'on',
    };

    const branchPreview = document.getElementById('branchPreview');
    const branchSummary = document.getElementById('branchSummary');
    const branchChart = document.getElementById('branchChart');
    const branchScoreNote = document.getElementById('branchScoreNote');

    function computeBranchMetrics() {
      const buyers = 980
        + (branchState.subscription === 'clear' ? 90 : 15)
        + (branchState.price === 'discount' ? 70 : 12)
        + (branchState.ad === 'distinct' ? 55 : 10)
        + (branchState.timer === 'on' ? 40 : 6);
      const reputation = 4.3
        + (branchState.subscription === 'clear' ? 0.18 : 0.03)
        + (branchState.price === 'discount' ? 0.12 : 0.02)
        + (branchState.ad === 'distinct' ? 0.11 : 0.02)
        + (branchState.timer === 'on' ? 0.09 : 0.01);
      const trust = 86
        + (branchState.subscription === 'clear' ? 5 : -2)
        + (branchState.price === 'discount' ? 4 : -1)
        + (branchState.ad === 'distinct' ? 3 : 1)
        + (branchState.timer === 'on' ? 2 : 0);
      const profit = 124
        + (branchState.subscription === 'clear' ? 24 : 8)
        + (branchState.price === 'discount' ? 20 : 6)
        + (branchState.ad === 'distinct' ? 16 : 4)
        + (branchState.timer === 'on' ? 12 : 3);

      return [
        { label: t('buyersLabel'), value: buyers, max: 1400, suffix: t('buyersSuffix'), color: '#2563eb' },
        { label: t('reputationLabel'), value: Number(reputation.toFixed(1)), max: 5, suffix: t('reputationSuffix'), color: '#16a34a' },
        { label: t('trustLabel'), value: trust, max: 120, suffix: t('trustSuffix'), color: '#f59e0b' },
        { label: t('profitLabel'), value: profit, max: 220, suffix: t('profitSuffix'), color: '#8b5cf6' },
      ];
    }

    function renderBranchPreview() {
      const subscriptionText = branchState.subscription === 'clear'
        ? t('subscriptionText')
        : t('subscriptionTextHidden');
      const priceText = branchState.price === 'discount'
        ? t('discountBadge')
        : '';

      branchPreview.innerHTML = `
        <div class="branch-preview-head">
          <div class="branch-preview-pill">${t('branchPreview')}</div>
          <div class="branch-preview-pill">${branchState.subscription === 'clear' ? t('subscriptionYes') : t('subscriptionNo')}</div>
        </div>
        <div class="branch-preview-card">
          <div class="preview-top">
            <span class="preview-tag">${branchState.subscription === 'clear' ? t('subscriptionTag') : t('normalPurchaseTag')}</span>
            <span class="preview-subtle">${branchState.ad === 'distinct' ? t('adTag') : t('recommendedTag')}</span>
          </div>
          <h3 class="product-title">${t('productName')}</h3>
          <p class="preview-subtle">${subscriptionText}</p>
          <div class="price-row">
            <span class="price-main">${t('normalPrice')}</span>
            ${branchState.price === 'discount' ? `<span class="price-original">${t('originalPrice')}</span>` : ''}
          </div>
          <div class="promo-badges">
            ${priceText ? `<span class="promo-badge">${priceText}</span>` : ''}
            ${branchState.timer === 'on' ? `<span class="promo-badge">${t('timerBadge')}</span>` : ''}
          </div>
          <button class="preview-cta">${t('purchaseButton')}</button>
        </div>
      `;

      const metrics = computeBranchMetrics();
      const strongCount = metrics.filter((metric) => metric.value >= metric.max * 0.8).length;
      branchChart.innerHTML = `
        <div class="branch-chart-grid">
          ${metrics.map((metric) => {
            const height = Math.max(12, Math.round((metric.value / metric.max) * 100));
            return `
              <div class="branch-chart-item">
                <div class="branch-chart-bar">
                  <div class="branch-chart-fill" style="height:${height}%"></div>
                </div>
                <div class="branch-chart-value">${metric.value}${metric.suffix}</div>
                <div class="branch-chart-label">${metric.label}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      branchScoreNote.textContent = strongCount >= 2
        ? t('metricsStrong')
        : t('metricsModerate');
      branchSummary.innerHTML = `
        <li>${t('summarySubscription')}${branchState.subscription === 'clear' ? t('subscriptionOn') : t('subscriptionOff')}</li>
        <li>${t('summaryPrice')}${branchState.price === 'original' ? t('priceOriginal') : t('priceDiscount')}</li>
        <li>${t('summaryAd')}${branchState.ad === 'distinct' ? t('adDistinct') : t('adBlend')}</li>
        <li>${t('summaryTimer')}${branchState.timer === 'on' ? t('timerOn') : t('timerOff')}</li>
      `;
    }

    document.querySelectorAll('.branch-options').forEach((group) => {
      group.addEventListener('click', (event) => {
        const button = event.target.closest('.branch-option');
        if (!button) return;
        const key = group.dataset.key;
        branchState[key] = button.dataset.value;
        group.querySelectorAll('.branch-option').forEach((option) => option.classList.toggle('active', option === button));
        renderBranchPreview();
      });
    });

    renderBranchPreview();
  </script>
  <script>
    class Player {
      constructor() {
        this.profit = 100;
        this.users = 1000;
        this.trust = 100;
        this.review = 4.8;
        this.flame = 0;
        this.regulation = 0;
        this.turn = 1;
        this.flameEvents = 0;
        this.history = [{ turn: 1, profit: 100, trust: 100, users: 1000, review: 4.8, flame: 0, regulation: 0 }];
      }

      clampStats() {
        this.trust = Math.max(0, Math.min(150, this.trust));
        this.review = Math.max(0, Math.min(5, Math.round(this.review * 100) / 100));
        this.users = Math.max(0, Math.round(this.users));
        this.flame = Math.max(0, Math.min(100, Math.round(this.flame)));
        this.regulation = Math.max(0, Math.min(120, Math.round(this.regulation)));
      }

      applyCard(card) {
        this.profit += card.profit;
        this.trust += card.trust;
        this.flame += card.flame;
        this.regulation += card.regulation;
        this.review += card.review;
        if (card.flame > 0) this.flameEvents += 1;
        this.clampStats();
      }

      applyLongTerm() {
        const trustPenalty = Math.max(0, 90 - this.trust);
        const userDelta = Math.round((this.trust - 100) * 0.25 - trustPenalty * 0.03);
        this.users += userDelta;
        this.profit -= Math.max(0, trustPenalty * 0.35);
        this.review -= Math.max(0, (90 - this.trust) * 0.01);
        this.review -= Math.max(0, (this.flame - 20) * 0.005);
        this.review = Math.min(5, this.review);
        this.clampStats();
        return { userDelta, longTermProfit: Math.max(0, trustPenalty * 0.35) };
      }

      pushHistory() {
        this.history.push({
          turn: this.turn,
          profit: this.profit,
          trust: this.trust,
          users: this.users,
          review: this.review,
          flame: this.flame,
          regulation: this.regulation,
        });
      }
    }

    class UIState {
      constructor() {
        this.reset();
      }

      reset() {
        this.title = '商品名';
        this.description = '商品説明';
        this.buttonText = '購入する';
        this.buttonLarge = false;
        this.stock = null;
        this.countdown = null;
        this.reviewStars = null;
        this.checkbox = null;
        this.popup = null;
        this.recommendation = false;
        this.unsubscribeSmall = false;
        this.fakeReview = false;
        this.closeButtonSmall = false;
      }

      clone() {
        const copy = new UIState();
        Object.assign(copy, this);
        return copy;
      }

      applyOption(option) {
        if (option.applyState) {
          option.applyState(this);
        }
      }
    }

    class Option {
      constructor(config) {
        Object.assign(this, config);
      }
    }

    class Event {
      constructor({ label, text, chance, effect }) {
        this.label = label;
        this.text = text;
        this.chance = chance;
        this.effect = effect;
      }
    }

    class Game {
      constructor() {
        this.player = new Player();
        this.currentUI = new UIState();
        this.initialUI = this.currentUI.clone();
        this.options = this.createOptions();
        this.availableOptions = [...this.options];
        this.appliedOptions = [];
        this.events = this.createEvents();
        this.isBusy = false;
        this.init();
      }

      createOptions() {
        return [
          new Option({
            id: 'buttonLarge',
            title: t('buttonLarge'),
            description: t('buttonLargeDesc'),
            profit: 5, trust: -1, flame: 0, regulation: 0, review: 0,
            cvr: '5.2%',
            highlightKey: 'buttonLarge',
            applyState: (state) => { state.buttonLarge = true; },
          }),
          new Option({
            id: 'stockNotification',
            title: t('stockNotification'),
            description: t('stockNotificationDesc'),
            profit: 10, trust: -4, flame: 3, regulation: 0, review: 0,
            cvr: '6.1%',
            highlightKey: 'stock',
            applyState: (state) => { state.stock = t('stockNotification'); },
          }),
          new Option({
            id: 'countdownTimer',
            title: t('countdownTimer'),
            description: t('countdownTimerDesc'),
            profit: 12, trust: -6, flame: 5, regulation: 0, review: 0,
            cvr: '7.1%',
            highlightKey: 'countdown',
            applyState: (state) => { state.countdown = t('timerBadge'); },
          }),
          new Option({
            id: 'reviewStars',
            title: t('reviewStars'),
            description: t('reviewStarsDesc'),
            profit: 4, trust: -1, flame: 0, regulation: 0, review: 0,
            cvr: '5.8%',
            highlightKey: 'reviewStars',
            applyState: (state) => { state.reviewStars = '★★★★★'; },
          }),
          new Option({
            id: 'checkboxOn',
            title: t('checkboxOn'),
            description: t('checkboxOnDesc'),
            profit: 8, trust: -5, flame: 2, regulation: 0, review: 0,
            cvr: '6.5%',
            highlightKey: 'checkbox',
            applyState: (state) => { state.checkbox = t('checkboxOn'); },
          }),
          new Option({
            id: 'unsubscribeSmall',
            title: t('unsubscribeSmall'),
            description: t('unsubscribeSmallDesc'),
            profit: 15, trust: -10, flame: 6, regulation: 4, review: 0,
            cvr: '7.4%',
            highlightKey: 'unsubscribeSmall',
            applyState: (state) => { state.unsubscribeSmall = true; },
          }),
          new Option({
            id: 'popupAd',
            title: t('popupAd'),
            description: t('popupAdDesc'),
            profit: 7, trust: -4, flame: 0, regulation: 0, review: -0.2,
            cvr: '6.8%',
            highlightKey: 'popup',
            applyState: (state) => { state.popup = t('discountBadge'); },
          }),
          new Option({
            id: 'recommendationLabel',
            title: t('recommendationLabel'),
            description: t('recommendationLabelDesc'),
            profit: 6, trust: -2, flame: 0, regulation: 0, review: 0,
            cvr: '5.4%',
            highlightKey: 'recommendation',
            applyState: (state) => { state.recommendation = true; },
          }),
          new Option({
            id: 'fakeReviewNote',
            title: t('fakeReview'),
            description: t('fakeReviewDesc'),
            profit: 9, trust: -8, flame: 4, regulation: 0, review: -0.1,
            cvr: '6.9%',
            highlightKey: 'fakeReview',
            applyState: (state) => { state.fakeReview = true; },
          }),
          new Option({
            id: 'closeButtonSmall',
            title: t('closeButtonSmall'),
            description: t('closeButtonSmallDesc'),
            profit: 5, trust: -3, flame: 1, regulation: 0, review: 0,
            cvr: '5.7%',
            highlightKey: 'closeButtonSmall',
            applyState: (state) => { state.closeButtonSmall = true; },
          }),
        ];
      }

      createEvents() {
        return [
          new Event({ label: t('snsBurn'), text: t('snsBurnText'), chance: 0.18, effect: (player) => { player.trust -= 8; player.review -= 0.2; player.users -= 25; return t('snsBurn'); } }),
          new Event({ label: t('reviewDrop'), text: t('reviewDropText'), chance: 0.15, effect: (player) => { player.review -= 0.4; player.users -= 40; return t('reviewDrop'); } }),
          new Event({ label: t('switchToCompetitor'), text: t('switchToCompetitorText'), chance: 0.14, effect: (player) => { player.users -= 50; player.profit -= 6; return t('switchToCompetitor'); } }),
          new Event({ label: t('consumerComplaint'), text: t('consumerComplaintText'), chance: 0.12, effect: (player) => { player.trust -= 6; player.regulation += 6; return t('consumerComplaint'); } }),
          new Event({ label: t('mediaFeature'), text: t('mediaFeatureText'), chance: 0.13, effect: (player) => { player.trust -= 5; player.users -= 20; player.review -= 0.2; return t('mediaFeature'); } }),
          new Event({ label: t('regulationWarning'), text: t('regulationWarningText'), chance: 0.1, effect: (player) => { player.regulation += 8; return t('regulationWarning'); } }),
          new Event({ label: t('appRating'), text: t('appRatingText'), chance: 0.12, effect: (player) => { player.review -= 0.3; player.users -= 15; return t('appRating'); } }),
        ];
      }

      init() {
        this.topStats = document.getElementById('topStats');
        this.appliedElements = document.getElementById('appliedElements');
        this.optionContainer = document.getElementById('optionContainer');
        this.rightStats = document.getElementById('rightStats');
        this.logContainer = document.getElementById('logContainer');
        this.abOverlay = document.getElementById('abOverlay');
        this.abCard = document.getElementById('abCard');
        this.messageOverlay = document.getElementById('messageOverlay');
        this.messageCard = document.getElementById('messageCard');
        this.currentPair = this.choosePair();
        this.render();
        this.addLog(t('gameStart'), t('gameStartNote'));
      }

      choosePair() {
        const pool = this.availableOptions.length >= 2 ? [...this.availableOptions] : [...this.options];
        const firstIndex = Math.floor(Math.random() * pool.length);
        const first = pool.splice(firstIndex, 1)[0];
        const secondIndex = Math.floor(Math.random() * pool.length);
        const second = pool.splice(secondIndex, 1)[0];
        return [first, second];
      }

      render() {
        this.renderTopStats();
        this.renderOptions();
        this.renderRightStats();
        this.renderAppliedList();
      }

      renderTopStats() {
        if (!this.topStats) return;
        const p = this.player;
        const items = [
          { label: t('profit'), value: `${t('profitUnit')}${p.profit}` },
          { label: t('trust'), value: `${p.trust}` },
          { label: t('review'), value: `${p.review.toFixed(1)}` },
          { label: t('users'), value: `${p.users}` },
          { label: t('flameRisk'), value: `${p.flame}` },
          { label: t('regulationRisk'), value: `${p.regulation}` },
          { label: t('turn'), value: `${p.turn}` },
        ];
        this.topStats.innerHTML = items.map(item => `
          <div class="stat-pill">
            <strong>${item.label}</strong>
            <div class="value">${item.value}</div>
          </div>
        `).join('');
      }

      renderOptions() {
        if (!this.optionContainer) return;
        this.optionContainer.innerHTML = this.currentPair.map((option, index) => {
          const previewState = this.currentUI.clone();
          previewState.applyOption(option);
          const mode = index === 0 ? 'clear' : 'soft';
          return `
            <div class="option-card" onclick="game.handleOptionSelected(${index})" tabindex="0">
              <div class="option-title">${index === 0 ? t('choice1') : t('choice2')}: ${option.title}</div>
              <p class="option-desc">${option.description}</p>
              <div class="sim-panel">${this.renderUIState(previewState, [option.highlightKey], mode)}</div>
              <div class="option-actions">
                <div class="hint">${t('selectChoice')}</div>
                <div style="display:flex; align-items:center; gap:10px; color:#94a3b8;">A: ${this.currentPair[0].cvr} / B: ${this.currentPair[1].cvr}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      renderRightStats() {
        if (!this.rightStats) return;
        const p = this.player;
        this.rightStats.innerHTML = `
          <div class="small-stat"><label>${t('profit')}</label><div class="value">${t('profitUnit')}${p.profit}</div></div>
          <div class="small-stat"><label>${t('trust')}</label><div class="value">${p.trust}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, p.trust)}%"></div></div></div>
          <div class="small-stat"><label>${t('review')}</label><div class="value">${p.review.toFixed(1)}</div></div>
          <div class="small-stat"><label>${t('users')}</label><div class="value">${p.users}</div></div>
          <div class="small-stat"><label>${t('flameRisk')}</label><div class="value">${p.flameEvents}</div></div>
          <div class="small-stat"><label>${t('regulationRisk')}</label><div class="value">${p.regulation}</div></div>
        `;
      }

      renderAppliedList() {
        this.appliedElements.innerHTML = this.appliedOptions.length > 0
          ? this.appliedOptions.map(item => `<li>${item}</li>`).join('')
          : `<li>${t('noChanges')}</li>`;
      }

      renderUIState(state, highlightKeys, mode = 'clear') {
        const isClear = mode === 'clear';
        const products = [
          { title: '限定セット', price: `${t('profitUnit')}39.80`, badge: t('flameRisk') },
          { title: 'フルスペック版', price: `${t('profitUnit')}59.80`, badge: t('users') },
          { title: 'お試しプラン', price: `${t('profitUnit')}19.80`, badge: t('profit') },
        ];
        const productMarkup = (product, index) => `
          <div class="selection-item">
            <div class="item-thumb">${index + 1}</div>
            <div class="item-body">
              <div class="item-name">${product.title}</div>
              <div class="item-price">${product.price}</div>
            </div>
            <button class="select-pill">${t('select')}</button>
          </div>
        `;
        const adMarkup = `
          <div class="ad-slot ${isClear ? 'mode-clear' : 'mode-soft'}">
            <div class="ad-badge">${t('adTag')}</div>
            <div class="ad-copy">${t('discountBadge')}</div>
            <div class="ad-note">${t('limited')}</div>
          </div>
        `;
        const listMarkup = `${productMarkup(products[0], 0)}${adMarkup}${productMarkup(products[1], 1)}${productMarkup(products[2], 2)}`;

        return `
          <div class="selection-page ${isClear ? 'mode-clear' : 'mode-soft'}">
            <div class="selection-top">
              <div>${t('productSelection')}</div>
              <div>${t('recommendedTag')}</div>
            </div>
            <div class="selection-list">
              ${listMarkup}
            </div>
          </div>
        `;
      }

      handleOptionSelected(index) {
        if (this.isBusy || this.isGameOver()) return;
        this.isBusy = true;
        const chosenOption = this.currentPair[index];
        this.showABTest(chosenOption, index);
      }

      showABTest(chosen, chosenIndex) {
        this.abOverlay.classList.remove('hidden');
        this.abCard.innerHTML = `
          <div class="ab-title">${t('abTestResult')}</div>
          <div class="ab-grid">
            <div class="ab-card"><h3>A${t('choice1')}</h3><p>${this.currentPair[0].title}</p><p>CVR ${this.currentPair[0].cvr}</p></div>
            <div class="ab-card"><h3>B${t('choice2')}</h3><p>${this.currentPair[1].title}</p><p>CVR ${this.currentPair[1].cvr}</p></div>
          </div>
          <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center; gap:14px;">
            <div class="winner">${t('winner')}${parseFloat(this.currentPair[0].cvr) > parseFloat(this.currentPair[1].cvr) ? t('versionA') : t('versionB')}</div>
            <div style="color:#475569;">${t('yourChoice')}${chosenIndex === 0 ? t('choice1') : t('choice2')}</div>
          </div>
          <div style="margin-top:20px; display:flex; gap:12px;"><button class="button secondary" id="skipButton">${t('confirmResult')}</button></div>
        `;
        const skipButton = document.getElementById('skipButton');
        skipButton.addEventListener('click', () => {
          this.abOverlay.classList.add('hidden');
          this.applySelectedOption(chosen);
        });
        setTimeout(() => {
          if (!this.abOverlay.classList.contains('hidden')) {
            this.abOverlay.classList.add('hidden');
            this.applySelectedOption(chosen);
          }
        }, 2400);
      }

      applySelectedOption(option) {
        this.currentUI.applyOption(option);
        this.appliedOptions.push(option.title);
        this.availableOptions = this.availableOptions.filter(o => o.id !== option.id);
        const previousProfit = this.player.profit;
        const previousTrust = this.player.trust;
        this.player.applyCard(option);
        const longTerm = this.player.applyLongTerm();
        this.player.pushHistory();
        this.render();
        this.addLog(option.title, `${t('adoptionLog')}${option.description}${t('shortTermProfit')}${option.profit}${t('trustChange')}${option.trust > 0 ? '+' : ''}${option.trust}${t('longTermEffect')}${longTerm.userDelta >= 0 ? '+' : ''}${longTerm.userDelta}${t('profitDecline')}${Math.round(longTerm.longTermProfit)}.`);
        this.handleRandomEvent();
        this.player.turn += 1;
        this.currentPair = this.choosePair();
        this.render();
        this.isBusy = false;
        if (this.isGameOver()) {
          this.showGameOver();
        }
      }

      handleRandomEvent() {
        const chance = Math.random();
        const event = this.events.find(e => chance < e.chance);
        if (!event) return;
        const message = event.effect(this.player);
        this.player.clampStats();
        this.addLog(event.label, `${event.text} ${message}`);
        this.showMessage(event.label, event.text);
      }

      addLog(title, text) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>${title}</strong><div>${text}</div>`;
        this.logContainer.prepend(entry);
        while (this.logContainer.children.length > 7) {
          this.logContainer.removeChild(this.logContainer.lastChild);
        }
      }

      showMessage(title, text) {
        this.messageCard.innerHTML = `
          <h3>${title}</h3>
          <p>${text}</p>
          <button class="button primary" id="closeMessage">${t('close')}</button>
        `;
        this.messageOverlay.classList.remove('hidden');
        document.getElementById('closeMessage').addEventListener('click', () => {
          this.messageOverlay.classList.add('hidden');
        });
      }

      isGameOver() {
        return this.player.trust <= 0 || this.player.users < 100 || this.player.regulation >= 100;
      }

      showGameOver() {
        const initialUIHtml = this.renderUIState(this.initialUI, []);
        const finalUIHtml = this.renderUIState(this.currentUI, []);
        const appliedList = this.appliedOptions.length > 0 ? this.appliedOptions.map(item => `<li>${item}</li>`).join('') : `<li>${t('noChanges')}</li>`;
        const historyTable = this.player.history.map(entry => `<li>${t('turn')} ${entry.turn}: ${t('profit')} ${t('profitUnit')}${entry.profit}, ${t('trust')} ${entry.trust}, ${t('users')} ${entry.users}, ${t('review')} ${entry.review.toFixed(1)}, ${t('flameRisk')} ${entry.flame}</li>`).join('');
        this.messageCard.innerHTML = `
          <h3>${t('gameOverTitle')}</h3>
          <p>${t('gameOverNote')}</p>
          <div class="summary-grid">
            <div class="summary-card"><h4>${t('initialUI')}</h4>${initialUIHtml}</div>
            <div class="summary-card"><h4>${t('finalUI')}</h4>${finalUIHtml}</div>
          </div>
          <div class="summary-card">
            <h4>${t('appliedElementsLabel')}</h4>
            <ul class="summary-list">${appliedList}</ul>
          </div>
          <div class="summary-card">
            <h4>${t('transitions')}</h4>
            <ul class="summary-list">${historyTable}</ul>
          </div>
          <button class="button primary" id="restartButton">${t('retryGame')}</button>
        `;
        this.messageOverlay.classList.remove('hidden');
        document.getElementById('restartButton').addEventListener('click', () => {
          this.reset();
          this.messageOverlay.classList.add('hidden');
        });
      }

      reset() {
        this.player = new Player();
        this.currentUI = new UIState();
        this.initialUI = this.currentUI.clone();
        this.availableOptions = [...this.options];
        this.appliedOptions = [];
        this.currentPair = this.choosePair();
        this.logContainer.innerHTML = '';
        this.render();
        this.addLog(t('gameRestart'), t('gameRestartNote'));
        this.isBusy = false;
      }
    }

    const game = new Game();
    initLanguageButtons();
  </script>
