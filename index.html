<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Pattern Simulator</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --border: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #64748b;
      --danger: #fb923c;
      --success: #cbd5e1;
      --warning: #fbbf24;
      --card: #111827;
      --shadow: 0 12px 30px rgba(2,6,23,0.35);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617 0%, #111827 100%);
      color: var(--text);
    }
    button, .card {
      font: inherit;
    }
    .top-bar {
      display: none;
    }
    .stat-pill {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: var(--shadow);
    }
    .stat-pill strong {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
    }
    .stat-pill .value {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 24px;
    }
    .branch-shell {
      padding: 24px 24px 0;
    }
    .branch-panel {
      display: grid;
      gap: 18px;
    }
    .branch-layout {
      display: grid;
      grid-template-columns: minmax(280px, 320px) minmax(0, 1fr) minmax(260px, 320px);
      gap: 18px;
      align-items: start;
    }
    .branch-left {
      display: grid;
      gap: 12px;
    }
    .branch-center {
      display: flex;
      justify-content: center;
    }
    .branch-right {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .branch-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .branch-card h3 {
      margin: 0;
      font-size: 1rem;
    }
    .branch-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .branch-option {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .branch-option:hover {
      transform: translateY(-1px);
    }
    .branch-option.active {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }
    .branch-preview {
      width: 100%;
      min-height: 60vh;
      max-width: 760px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 20px;
      display: grid;
      gap: 14px;
      color: #0f172a;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,0.12);
      overflow: auto;
    }
    .branch-preview.drag-over {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .branch-preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .branch-preview-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .branch-preview-card {
      border: 1px solid #dbe3ea;
      border-radius: 20px;
      padding: 18px;
      display: grid;
      gap: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
    }
    .branch-preview-card .preview-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .branch-preview-card .preview-tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 800;
      font-size: 0.8rem;
    }
    .branch-preview-card .preview-subtle {
      color: #64748b;
      font-size: 0.9rem;
    }
    .subscription-callout {
      position: relative;
      width: 100%;
      display: grid;
      gap: 0;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 6px 10px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .subscription-callout:hover,
    .subscription-callout:focus-visible {
      transform: translateY(-1px);
      border-color: #dbe3ea;
    }
    .subscription-callout.selected {
      border-color: #dbe3ea;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }
    .subscription-callout .subscription-change-mark {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #2563eb;
      font-size: 0.78rem;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.14);
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }
    .subscription-callout.selected .subscription-change-mark {
      opacity: 1;
      transform: scale(1);
    }
    .subscription-callout .subscription-callout-label {
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #2563eb;
    }
    .subscription-callout .subscription-callout-text {
      line-height: 1.25;
      color: #334155;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .subscription-callout.clear {
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      padding: 6px 10px;
    }
    .subscription-callout.clear.selected {
      border-color: #93c5fd;
    }
    .subscription-callout.clear .subscription-callout-text {
      font-size: 1rem;
      font-weight: 800;
      color: #0f172a;
    }
    .subscription-callout.clear .subscription-change-mark {
      background: #2563eb;
      color: #ffffff;
    }
    .subscription-callout.hidden {
      background: #f8fafc;
      padding: 6px 10px;
    }
    .subscription-callout.hidden.selected {
      border-color: #e2e8f0;
    }
    .subscription-callout.hidden .subscription-callout-text {
      font-size: 0.92rem;
      color: #64748b;
      font-weight: 500;
      line-height: 1.25;
    }
    .subscription-callout.hidden .subscription-change-mark {
      background: #e2e8f0;
      color: #64748b;
    }
    .branch-preview-card .subscription-callout {
      margin-top: 0;
    }
    .branch-preview-card .product-title {
      margin: 0;
      font-size: 1.2rem;
    }
    .branch-preview-card .price-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .branch-preview-card .price-row .promo-badge {
      padding: 6px 10px;
      background: #fef3c7;
      color: #92400e;
      font-size: 0.8rem;
    }
    .branch-preview-card .price-row .timer-inline {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, #ef4444 0%, #f97316 55%, #fbbf24 100%);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
    }
    .branch-preview-card .price-row .timer-inline.selected {
      outline: 2px dashed #ffffff;
      outline-offset: 2px;
      box-shadow:
        0 18px 32px rgba(220, 38, 38, 0.34),
        inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .branch-preview-card .price-row .timer-inline .timer-remove,
    .branch-preview-card .price-row .discount-remove,
    .timer-placement[data-role="timer-widget"] .timer-remove,
    .timer-remove {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #ffffff;
      color: #dc2626;
      display: grid;
      place-items: center;
      font-size: 0.8rem;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.18);
    }
    .branch-preview-card .price-row .discount-inline {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .branch-preview-card .price-row .discount-inline.selected {
      outline: 2px dashed #f59e0b;
      outline-offset: 2px;
    }
    .branch-preview-card .price-main {
      font-size: 1.7rem;
      font-weight: 800;
      color: #0f172a;
    }
    .branch-preview-card .price-original {
      position: relative;
      display: inline-block;
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1;
      text-decoration: none;
    }
    .branch-preview-card .price-original::after {
      content: '';
      position: absolute;
      left: -0.18em;
      right: -0.18em;
      top: 50%;
      height: 0.12em;
      transform: translateY(-50%) rotate(-6deg);
      transform-origin: center;
      background: #ef4444;
      border-radius: 999px;
      color: #ef4444;
      pointer-events: none;
    }
    .branch-preview-card .promo-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }
    .branch-preview-card .promo-badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 7px 10px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 700;
      font-size: 0.82rem;
    }
    .branch-preview-card .promo-badge.timer-badge {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.14);
      font-variant-numeric: tabular-nums;
    }
    .branch-preview-card .promo-timer-note {
      color: #dc2626;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-right: 8px;
      text-transform: none;
    }
    .branch-preview-card .promo-badge.soft {
      background: #f1f5f9;
      color: #475569;
    }
    .branch-preview-card .preview-cta {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      background: #16a34a;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    .branch-score {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 18px;
      display: grid;
      gap: 12px;
      color: #0f172a;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .branch-score h3 {
      margin: 0;
      font-size: 1rem;
    }
    .branch-metrics-content {
      display: grid;
      gap: 12px;
    }
    .branch-metrics-content.hidden {
      display: grid;
    }
    .finish-button {
      justify-self: end;
      border: none;
      border-radius: 999px;
      background: #fbbf24;
      color: #111827;
      padding: 10px 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(251, 191, 36, 0.25);
    }
    .finish-button:hover {
      transform: translateY(-1px);
    }
    .timer-drag-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: flex-start;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: grab;
      user-select: none;
      position: relative;
      transition: transform 0.2s ease, opacity 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .timer-drag-item + .timer-drag-item {
      margin-top: 8px;
    }
    .timer-drag-item[data-kind="timer"] {
      border-color: rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, #ef4444 0%, #f97316 55%, #fbbf24 100%);
      color: #ffffff;
      box-shadow:
        0 16px 28px rgba(239, 68, 68, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }
    .timer-drag-item[data-kind="discount"] {
      border-color: #f59e0b;
      background: #fef3c7;
      color: #92400e;
      box-shadow: 0 10px 18px rgba(245, 158, 11, 0.12);
    }
    .timer-drag-item.placed {
      opacity: 0.48;
      filter: grayscale(0.95) saturate(0.35);
      box-shadow: none;
    }
    .timer-drag-item.placed:hover {
      transform: none;
    }
    .timer-drop-hint {
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .timer-placement {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #f59e0b;
      background: #fff7ed;
      color: #c2410c;
      font-weight: 800;
      font-size: 0.82rem;
      position: relative;
    }
    .timer-placement[data-role="timer-widget"] {
      min-width: min(100%, 280px);
      padding: 12px 14px 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, #ef4444 0%, #f97316 55%, #fbbf24 100%);
      color: #ffffff;
      box-shadow:
        0 16px 28px rgba(239, 68, 68, 0.28),
        inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      animation: timer-pulse 1.8s ease-in-out infinite;
    }
    .timer-placement[data-role="timer-widget"]::before {
      content: 'COUNTDOWN';
      position: absolute;
      top: -10px;
      left: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.94);
      color: #fde68a;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.16em;
    }
    .timer-placement[data-role="timer-widget"] > span:first-child {
      font-size: 1.1rem;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.18));
    }
    .timer-placement[data-role="timer-widget"] > span:nth-child(2) {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
    }
    .timer-placement.selected {
      outline: 2px dashed #dc2626;
      outline-offset: 4px;
      background: #fff1f2;
    }
    .timer-placement[data-role="timer-widget"].selected {
      outline-color: #ffffff;
      background: linear-gradient(135deg, #dc2626 0%, #fb7185 100%);
      box-shadow:
        0 18px 32px rgba(220, 38, 38, 0.34),
        inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .branch-preview-card .subscription-callout + .price-row {
      margin-top: 2px;
    }
    .branch-metrics-content.hidden {
      display: none;
    }
    .metric-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric-modal-head h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #111827;
    }
    .branch-chart {
      display: grid;
      gap: 12px;
    }
    .prediction-grid {
      display: grid;
      gap: 10px;
    }
    .prediction-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .prediction-item.high {
      border-color: #fecaca;
      background: #fff1f2;
    }
    .prediction-item.mid {
      border-color: #fde68a;
      background: #fffbeb;
    }
    .prediction-item.low {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }
    .prediction-label {
      font-size: 0.9rem;
      font-weight: 800;
      color: #0f172a;
    }
    .prediction-detail {
      margin-top: 2px;
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
    }
    .prediction-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 900;
      font-size: 0.82rem;
    }
    .prediction-pill.high {
      background: #fee2e2;
      color: #b91c1c;
    }
    .prediction-pill.mid {
      background: #fef3c7;
      color: #92400e;
    }
    .prediction-pill.low {
      background: #dcfce7;
      color: #166534;
    }
    .branch-chart-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    .branch-chart-item {
      display: grid;
      gap: 8px;
      min-height: 180px;
    }
    .branch-chart-bar {
      height: 140px;
      background: #e2e8f0;
      border-radius: 14px;
      padding: 6px;
      display: flex;
      align-items: flex-end;
    }
    .branch-chart-fill {
      width: 100%;
      border-radius: 10px;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
      transition: height 0.25s ease;
    }
    .branch-chart-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #334155;
      text-align: center;
    }
    .branch-chart-value {
      font-size: 0.9rem;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
    }
    .panel {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(2,6,23,0.25);
      padding: 20px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
      color: #e2e8f0;
    }
    .panel-sub {
      margin-bottom: 22px;
    }
    .section-note {
      margin: 0 0 16px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .status-grid {
      display: grid;
      gap: 16px;
    }
    .small-stat {
      display: grid;
      gap: 8px;
      padding: 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
    }
    .small-stat label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .small-stat .value {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .progress-bar {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      width: 0;
      transition: width 0.6s ease;
    }
    .ui-frame {
      background: #ffffff;
      border: 2px solid #2563eb;
      border-radius: 28px;
      padding: 22px;
      min-height: 540px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: inset 0 0 0 1px rgba(37,99,235,0.08);
    }
    .ui-frame::before {
      content: '実際に運用中のUI';
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
    }
    .product-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 24px;
      display: grid;
      gap: 16px;
      position: relative;
    }
    .option-preview {
      border: 1px dashed #94a3b8;
      border-radius: 22px;
      background: #f1f5f9;
      padding: 12px;
      min-height: 260px;
      display: grid;
      gap: 10px;
      position: relative;
    }
    .preview-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.05);
      width: fit-content;
    }
    .option-preview .product-card {
      margin: 0;
      border-color: #cbd5e1;
      box-shadow: none;
    }
    .product-card.large-button .primary-btn {
      padding: 18px 0;
      font-size: 1rem;
    }
    .product-card .top-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;

    let currentLanguage = localStorage.getItem('darkPatternLang') || 'ja';

    function t(key) {
      return (translations[currentLanguage] && translations[currentLanguage][key]) || translations.ja[key] || key;
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('darkPatternLang', lang);
      
      // Update all language buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      
      // Update all elements with data-text attribute
      document.querySelectorAll('[data-text]').forEach(el => {
        const key = el.dataset.text;
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      
      // Update all elements with data-html attribute
      document.querySelectorAll('[data-html]').forEach(el => {
        const key = el.dataset.html;
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });
      
      // Update game translations and re-render if game exists
      if (window.game && typeof window.game.updateTranslations === 'function') {
        window.game.updateTranslations();
      }
      if (window.game && window.game.render) {
        window.game.render();
      }
    }

    // Initialize language button listeners
    function initLanguageButtons() {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          setLanguage(btn.dataset.lang);
        });
      });
      
      // Set initial language state
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLanguage);
      });
    }
  </script>
  <script>
    const branchState = {
      subscription: 'clear',
      price: 'original',
      ad: 'distinct',
      timer: 'off',
    };

    const branchPreview = document.getElementById('branchPreview');
    const branchMetricsContent = document.getElementById('branchMetricsContent');
    const branchSummary = document.getElementById('branchSummary');
    const branchChart = document.getElementById('branchChart');
    const branchScoreNote = document.getElementById('branchScoreNote');
    const finishMetricsButton = document.getElementById('finishMetricsButton');
    const metricsOverlay = document.getElementById('metricsOverlay');
    const metricsPopupContent = document.getElementById('metricsPopupContent');
    const closeMetricsButton = document.getElementById('closeMetricsButton');
    const timerDraggable = document.getElementById('timerDraggable');
    const discountDraggable = document.getElementById('discountDraggable');
    const COUNTDOWN_START_SECONDS = 5 * 60;
    let branchCountdownSeconds = COUNTDOWN_START_SECONDS;
    let branchCountdownTimerId = null;
    let branchCountdownFinished = false;
    let selectedPlacementWidget = null;

    function syncBranchWidgetStates(timerLabelText = 'この価格で買えるのは残り 05:00') {
      if (timerDraggable) {
        timerDraggable.classList.toggle('placed', branchState.timer === 'on');
        const timerTextNode = timerDraggable.querySelector('span:nth-child(2)');
        if (timerTextNode) {
          timerTextNode.textContent = timerLabelText;
        }
      }
      if (discountDraggable) {
        discountDraggable.classList.toggle('placed', branchState.price === 'discount');
      }
    }

    function formatCountdown(seconds) {
      const safeSeconds = Math.max(0, seconds);
      const minutes = Math.floor(safeSeconds / 60);
      const remainingSeconds = safeSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
    }

    function stopBranchCountdown(reset = false, finished = false) {
      if (branchCountdownTimerId !== null) {
        clearInterval(branchCountdownTimerId);
        branchCountdownTimerId = null;
      }
      if (reset) {
        branchCountdownSeconds = COUNTDOWN_START_SECONDS;
      }
      branchCountdownFinished = finished;
    }

    function getStageLevel(ratio, reverse = false) {
      if (!reverse) {
        if (ratio >= 0.78) return 'high';
        if (ratio >= 0.55) return 'mid';
        return 'low';
      }
      if (ratio <= 0.22) return 'high';
      if (ratio <= 0.45) return 'mid';
      return 'low';
    }

    function getStageWord(kind, level) {
      if (currentLanguage === 'en') {
        return { high: 'High', mid: 'Medium', low: 'Low' }[level];
      }
      if (kind === 'trust') {
        return { high: '高', mid: '中', low: '低' }[level];
      }
      return { high: '大', mid: '中', low: '小' }[level];
    }

    function computeBranchMetrics() {
      const buyers = 980
        + (branchState.subscription === 'clear' ? 90 : 15)
        + (branchState.price === 'discount' ? 70 : 12)
        + (branchState.ad === 'distinct' ? 55 : 10)
        + (branchState.timer === 'on' ? 40 : 6);
      const reputation = 4.3
        + (branchState.subscription === 'clear' ? 0.18 : 0.03)
        + (branchState.price === 'discount' ? 0.12 : 0.02)
        + (branchState.ad === 'distinct' ? 0.11 : 0.02)
        + (branchState.timer === 'on' ? 0.09 : 0.01);
      const trust = 86
        + (branchState.subscription === 'clear' ? 5 : -2)
        + (branchState.price === 'discount' ? 4 : -1)
        + (branchState.ad === 'distinct' ? 3 : 1)
        + (branchState.timer === 'on' ? 2 : 0);
      const profit = 124
        + (branchState.subscription === 'clear' ? 24 : 8)
        + (branchState.price === 'discount' ? 20 : 6)
        + (branchState.ad === 'distinct' ? 16 : 4)
        + (branchState.timer === 'on' ? 12 : 3);

      return [
        { label: t('buyersLabel'), value: buyers, max: 1400, suffix: t('buyersSuffix'), color: '#2563eb' },
        { label: t('reputationLabel'), value: Number(reputation.toFixed(1)), max: 5, suffix: t('reputationSuffix'), color: '#16a34a' },
        { label: t('trustLabel'), value: trust, max: 120, suffix: t('trustSuffix'), color: '#f59e0b' },
        { label: t('profitLabel'), value: profit, max: 220, suffix: t('profitSuffix'), color: '#8b5cf6' },
      ];
    }

    function buildPredictionItems(metrics) {
      const [buyersMetric, reputationMetric, trustMetric, profitMetric] = metrics;
      const buyersLevel = getStageLevel(buyersMetric.value / buyersMetric.max);
      const flameLevel = getStageLevel((120 - trustMetric.value) / 120, true);
      const trustLevel = getStageLevel(trustMetric.value / trustMetric.max);
      const profitLevel = getStageLevel(profitMetric.value / profitMetric.max);

      return [
        { label: t('buyersForecast'), stage: getStageWord('generic', buyersLevel), level: buyersLevel },
        { label: t('flameForecast'), stage: getStageWord('generic', flameLevel), level: flameLevel },
        { label: t('trustForecast'), stage: getStageWord('trust', trustLevel), level: trustLevel },
        { label: t('profitForecast'), stage: getStageWord('generic', profitLevel), level: profitLevel },
      ];
    }

    function renderBranchMetricPanels() {
      const metrics = computeBranchMetrics();
      const predictionItems = buildPredictionItems(metrics);
      const predictionMarkup = `
        <div class="prediction-grid">
          ${predictionItems.map((item) => `
            <div class="prediction-item ${item.level}">
              <div>
                <div class="prediction-label">${item.label}</div>
              </div>
              <span class="prediction-pill ${item.level}">${item.stage}</span>
            </div>
          `).join('')}
        </div>
      `;
      const detailChartMarkup = `
        <div class="branch-chart-grid">
          ${metrics.map((metric) => {
            const height = Math.max(12, Math.round((metric.value / metric.max) * 100));
            return `
              <div class="branch-chart-item">
                <div class="branch-chart-bar">
                  <div class="branch-chart-fill" style="height:${height}%"></div>
                </div>
                <div class="branch-chart-value">${metric.value}${metric.suffix}</div>
                <div class="branch-chart-label">${metric.label}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      branchChart.innerHTML = predictionMarkup;
      if (metricsPopupContent) {
        metricsPopupContent.innerHTML = `
          <div class="branch-chart">${detailChartMarkup}</div>
          <div class="branch-score-note">${t('metricsNote')}</div>
        `;
      }
    }

    function renderBranchPreview() {
      const subscriptionVariant = branchState.subscription === 'clear' ? 'clear' : 'hidden';
      const subscriptionTextMarkup = branchState.subscription === 'clear'
        ? '⚠︎ 月1回の定期便です / 毎月15日に引き落とし'
        : '定期便';
      const timerText = branchState.timer === 'on'
        ? formatCountdown(branchCountdownSeconds)
        : '';

      if (branchState.timer === 'on') {
        if (branchCountdownTimerId === null && !branchCountdownFinished) {
          branchCountdownTimerId = setInterval(() => {
            if (branchState.timer !== 'on') {
              stopBranchCountdown(true);
              renderBranchPreview();
              return;
            }
            if (branchCountdownSeconds > 0) {
              branchCountdownSeconds -= 1;
            }
            if (branchCountdownSeconds === 0) {
              stopBranchCountdown(false, true);
            }
            renderBranchPreview();
          }, 1000);
        }
      } else {
        stopBranchCountdown(true, false);
      }

      const subscriptionMarkup = `<button type="button" class="subscription-callout ${subscriptionVariant} ${selectedPlacementWidget === 'subscription' ? 'selected' : ''}" data-role="subscription-widget" aria-label="定期便の表示を切り替える">
        <span class="subscription-change-mark">⇄</span>
        <span class="subscription-callout-text">${subscriptionTextMarkup}</span>
      </button>`;
      const timerInlineLabel = `この価格で買えるのは残り ${timerText || '05:00'}`;
      const timerInlineMarkup = branchState.timer === 'on'
        ? `<span class="timer-inline ${selectedPlacementWidget === 'timer' ? 'selected' : ''}" data-role="timer-widget">
            <span>⏱</span>
            <span>${timerInlineLabel}</span>
            ${selectedPlacementWidget === 'timer' ? '<button class="timer-remove" type="button" aria-label="削除">×</button>' : ''}
          </span>`
        : '';
      const discountInlineMarkup = branchState.price === 'discount'
        ? `<div class="promo-badge discount-inline ${selectedPlacementWidget === 'discount' ? 'selected' : ''}" data-role="discount-widget">
            <span>🏷</span>
            <span>${t('discountBadge')}</span>
            ${selectedPlacementWidget === 'discount' ? '<button type="button" class="discount-remove" aria-label="削除">×</button>' : ''}
          </div>`
        : '';

      branchPreview.innerHTML = `
        <div class="branch-preview-card">
          <div class="preview-top">
            <span class="preview-tag">${branchState.subscription === 'clear' ? t('subscriptionTag') : t('normalPurchaseTag')}</span>
            <span class="preview-subtle">${branchState.ad === 'distinct' ? t('adTag') : t('recommendedTag')}</span>
          </div>
          <h3 class="product-title">${t('productName')}</h3>
          <div class="price-row">
            <span class="price-main">${t('normalPrice')}</span>
            ${branchState.price === 'discount' ? `<span class="price-original">${t('originalPrice')}</span>` : ''}
            ${discountInlineMarkup}
            ${timerInlineMarkup}
          </div>
          ${subscriptionMarkup}
          <div class="promo-badges"></div>
          <button class="preview-cta">${t('purchaseButton')}</button>
        </div>
      `;

      syncBranchWidgetStates(timerInlineLabel);
      renderBranchMetricPanels();
    }

    if (timerDraggable) {
      timerDraggable.addEventListener('dragstart', (event) => {
        event.dataTransfer.setData('text/plain', 'timer');
        event.dataTransfer.effectAllowed = 'copy';
      });
    }
    if (discountDraggable) {
      discountDraggable.addEventListener('dragstart', (event) => {
        event.dataTransfer.setData('text/plain', 'discount');
        event.dataTransfer.effectAllowed = 'copy';
      });
    }

    branchPreview.addEventListener('dragover', (event) => {
      event.preventDefault();
      branchPreview.classList.add('drag-over');
    });

    branchPreview.addEventListener('dragleave', () => {
      branchPreview.classList.remove('drag-over');
    });

    branchPreview.addEventListener('drop', (event) => {
      event.preventDefault();
      branchPreview.classList.remove('drag-over');
      const droppedType = event.dataTransfer.getData('text/plain');
      if (droppedType === 'timer') {
        branchState.timer = 'on';
        selectedPlacementWidget = null;
        renderBranchPreview();
      }
      if (droppedType === 'discount') {
        branchState.price = 'discount';
        selectedPlacementWidget = null;
        renderBranchPreview();
      }
    });

    branchPreview.addEventListener('click', (event) => {
      const widget = event.target.closest('[data-role="timer-widget"], [data-role="discount-widget"], [data-role="subscription-widget"]');
      if (!widget) {
        const clickedInsidePreview = event.target.closest('.branch-preview-card, .branch-preview');
        const clickedInteractiveElement = event.target.closest('button, a, input, textarea, select');
        if (clickedInsidePreview && !clickedInteractiveElement) {
          selectedPlacementWidget = null;
          renderBranchPreview();
        }
        return;
      }
      const widgetType = widget.dataset.role === 'discount-widget'
        ? 'discount'
        : widget.dataset.role === 'subscription-widget'
          ? 'subscription'
          : 'timer';
      if (event.target.closest('.timer-remove, .discount-remove')) {
        if (widgetType === 'timer') {
          branchState.timer = 'off';
        } else if (widgetType === 'discount') {
          branchState.price = 'original';
        } else {
          branchState.timer = 'off';
        }
        selectedPlacementWidget = null;
        renderBranchPreview();
        return;
      }
      if (widgetType === 'subscription') {
        if (event.target.closest('.subscription-change-mark')) {
          branchState.subscription = branchState.subscription === 'clear' ? 'hidden' : 'clear';
          selectedPlacementWidget = 'subscription';
          renderBranchPreview();
          return;
        }
        selectedPlacementWidget = 'subscription';
        renderBranchPreview();
        return;
      }
      selectedPlacementWidget = widgetType;
      renderBranchPreview();
    });

    finishMetricsButton.addEventListener('click', () => {
      renderBranchMetricPanels();
      metricsOverlay.classList.remove('hidden');
    });

    closeMetricsButton.addEventListener('click', () => {
      metricsOverlay.classList.add('hidden');
    });

    metricsOverlay.addEventListener('click', (event) => {
      if (event.target === metricsOverlay) {
        metricsOverlay.classList.add('hidden');
      }
    });

    document.querySelectorAll('.branch-options').forEach((group) => {
      group.addEventListener('click', (event) => {
        const button = event.target.closest('.branch-option');
        if (!button) return;
        const key = group.dataset.key;
        branchState[key] = button.dataset.value;
        group.querySelectorAll('.branch-option').forEach((option) => option.classList.toggle('active', option === button));
        renderBranchPreview();
      });
    });

    renderBranchPreview();
    syncBranchWidgetStates();
  </script>
  <script>
    class Player {
      constructor() {
        this.profit = 100;
        this.users = 1000;
        this.trust = 100;
        this.review = 4.8;
        this.flame = 0;
        this.regulation = 0;
        this.turn = 1;
        this.flameEvents = 0;
        this.history = [{ turn: 1, profit: 100, trust: 100, users: 1000, review: 4.8, flame: 0, regulation: 0 }];
      }

      clampStats() {
        this.trust = Math.max(0, Math.min(150, this.trust));
        this.review = Math.max(0, Math.min(5, Math.round(this.review * 100) / 100));
        this.users = Math.max(0, Math.round(this.users));
        this.flame = Math.max(0, Math.min(100, Math.round(this.flame)));
        this.regulation = Math.max(0, Math.min(120, Math.round(this.regulation)));
      }

      applyCard(card) {
        this.profit += card.profit;
        this.trust += card.trust;
        this.flame += card.flame;
        this.regulation += card.regulation;
        this.review += card.review;
        if (card.flame > 0) this.flameEvents += 1;
        this.clampStats();
      }

      applyLongTerm() {
        const trustPenalty = Math.max(0, 90 - this.trust);
        const userDelta = Math.round((this.trust - 100) * 0.25 - trustPenalty * 0.03);
        this.users += userDelta;
        this.profit -= Math.max(0, trustPenalty * 0.35);
        this.review -= Math.max(0, (90 - this.trust) * 0.01);
        this.review -= Math.max(0, (this.flame - 20) * 0.005);
        this.review = Math.min(5, this.review);
        this.clampStats();
        return { userDelta, longTermProfit: Math.max(0, trustPenalty * 0.35) };
      }

      pushHistory() {
        this.history.push({
          turn: this.turn,
          profit: this.profit,
          trust: this.trust,
          users: this.users,
          review: this.review,
          flame: this.flame,
          regulation: this.regulation,
        });
      }
    }

    class UIState {
      constructor() {
        this.reset();
      }

      reset() {
        this.title = t('productName');
        this.description = t('subscriptionText');
        this.buttonText = t('purchaseButton');
        this.buttonLarge = false;
        this.stock = null;
        this.countdown = null;
        this.reviewStars = null;
        this.checkbox = null;
        this.popup = null;
        this.recommendation = false;
        this.unsubscribeSmall = false;
        this.fakeReview = false;
        this.closeButtonSmall = false;
      }

      clone() {
        const copy = new UIState();
        Object.assign(copy, this);
        return copy;
      }

      applyOption(option) {
        if (option.applyState) {
          option.applyState(this);
        }
      }
    }

    class Option {
      constructor(config) {
        Object.assign(this, config);
      }
    }

    class Event {
      constructor({ label, text, chance, effect }) {
        this.label = label;
        this.text = text;
        this.chance = chance;
        this.effect = effect;
      }
    }

    class Game {
      constructor() {
        this.player = new Player();
        this.currentUI = new UIState();
        this.initialUI = this.currentUI.clone();
        this.options = this.createOptions();
        this.availableOptions = [...this.options];
        this.appliedOptions = [];
        this.events = this.createEvents();
        this.isBusy = false;
        this.init();
      }

      createOptions() {
        return [
          new Option({
            id: 'buttonLarge',
            titleKey: 'buttonLarge',
            descriptionKey: 'buttonLargeDesc',
            title: t('buttonLarge'),
            description: t('buttonLargeDesc'),
            profit: 5, trust: -1, flame: 0, regulation: 0, review: 0,
            cvr: '5.2%',
            highlightKey: 'buttonLarge',
            applyState: (state) => { state.buttonLarge = true; },
          }),
          new Option({
            id: 'stockNotification',
            titleKey: 'stockNotification',
            descriptionKey: 'stockNotificationDesc',
            title: t('stockNotification'),
            description: t('stockNotificationDesc'),
            profit: 10, trust: -4, flame: 3, regulation: 0, review: 0,
            cvr: '6.1%',
            highlightKey: 'stock',
            applyState: (state) => { state.stock = t('stockNotification'); },
          }),
          new Option({
            id: 'countdownTimer',
            titleKey: 'countdownTimer',
            descriptionKey: 'countdownTimerDesc',
            title: t('countdownTimer'),
            description: t('countdownTimerDesc'),
            profit: 12, trust: -6, flame: 5, regulation: 0, review: 0,
            cvr: '7.1%',
            highlightKey: 'countdown',
            applyState: (state) => { state.countdown = t('timerBadge'); },
          }),
          new Option({
            id: 'reviewStars',
            titleKey: 'reviewStars',
            descriptionKey: 'reviewStarsDesc',
            title: t('reviewStars'),
            description: t('reviewStarsDesc'),
            profit: 4, trust: -1, flame: 0, regulation: 0, review: 0,
            cvr: '5.8%',
            highlightKey: 'reviewStars',
            applyState: (state) => { state.reviewStars = '★★★★★'; },
          }),
          new Option({
            id: 'checkboxOn',
            titleKey: 'checkboxOn',
            descriptionKey: 'checkboxOnDesc',
            title: t('checkboxOn'),
            description: t('checkboxOnDesc'),
            profit: 8, trust: -5, flame: 2, regulation: 0, review: 0,
            cvr: '6.5%',
            highlightKey: 'checkbox',
            applyState: (state) => { state.checkbox = t('checkboxOn'); },
          }),
          new Option({
            id: 'unsubscribeSmall',
            titleKey: 'unsubscribeSmall',
            descriptionKey: 'unsubscribeSmallDesc',
            title: t('unsubscribeSmall'),
            description: t('unsubscribeSmallDesc'),
            profit: 15, trust: -10, flame: 6, regulation: 4, review: 0,
            cvr: '7.4%',
            highlightKey: 'unsubscribeSmall',
            applyState: (state) => { state.unsubscribeSmall = true; },
          }),
          new Option({
            id: 'popupAd',
            titleKey: 'popupAd',
            descriptionKey: 'popupAdDesc',
            title: t('popupAd'),
            description: t('popupAdDesc'),
            profit: 7, trust: -4, flame: 0, regulation: 0, review: -0.2,
            cvr: '6.8%',
            highlightKey: 'popup',
            applyState: (state) => { state.popup = t('discountBadge'); },
          }),
          new Option({
            id: 'recommendationLabel',
            titleKey: 'recommendationLabel',
            descriptionKey: 'recommendationLabelDesc',
            title: t('recommendationLabel'),
            description: t('recommendationLabelDesc'),
            profit: 6, trust: -2, flame: 0, regulation: 0, review: 0,
            cvr: '5.4%',
            highlightKey: 'recommendation',
            applyState: (state) => { state.recommendation = true; },
          }),
          new Option({
            id: 'fakeReviewNote',
            titleKey: 'fakeReview',
            descriptionKey: 'fakeReviewDesc',
            title: t('fakeReview'),
            description: t('fakeReviewDesc'),
            profit: 9, trust: -8, flame: 4, regulation: 0, review: -0.1,
            cvr: '6.9%',
            highlightKey: 'fakeReview',
            applyState: (state) => { state.fakeReview = true; },
          }),
          new Option({
            id: 'closeButtonSmall',
            titleKey: 'closeButtonSmall',
            descriptionKey: 'closeButtonSmallDesc',
            title: t('closeButtonSmall'),
            description: t('closeButtonSmallDesc'),
            profit: 5, trust: -3, flame: 1, regulation: 0, review: 0,
            cvr: '5.7%',
            highlightKey: 'closeButtonSmall',
            applyState: (state) => { state.closeButtonSmall = true; },
          }),
        ];
      }

      updateTranslations() {
        if (!this.options) return;
        this.options.forEach(opt => {
          if (opt.titleKey) opt.title = t(opt.titleKey);
          if (opt.descriptionKey) opt.description = t(opt.descriptionKey);
        });
        if (this.currentUI) {
          this.currentUI.title = t('productName');
          this.currentUI.description = t('subscriptionText');
          this.currentUI.buttonText = t('purchaseButton');
        }
        if (this.initialUI) {
          this.initialUI.title = this.currentUI.title;
          this.initialUI.description = this.currentUI.description;
          this.initialUI.buttonText = this.currentUI.buttonText;
        }
      }

      createEvents() {
        return [
          new Event({ label: t('snsBurn'), text: t('snsBurnText'), chance: 0.18, effect: (player) => { player.trust -= 8; player.review -= 0.2; player.users -= 25; return t('snsBurn'); } }),
          new Event({ label: t('reviewDrop'), text: t('reviewDropText'), chance: 0.15, effect: (player) => { player.review -= 0.4; player.users -= 40; return t('reviewDrop'); } }),
          new Event({ label: t('switchToCompetitor'), text: t('switchToCompetitorText'), chance: 0.14, effect: (player) => { player.users -= 50; player.profit -= 6; return t('switchToCompetitor'); } }),
          new Event({ label: t('consumerComplaint'), text: t('consumerComplaintText'), chance: 0.12, effect: (player) => { player.trust -= 6; player.regulation += 6; return t('consumerComplaint'); } }),
          new Event({ label: t('mediaFeature'), text: t('mediaFeatureText'), chance: 0.13, effect: (player) => { player.trust -= 5; player.users -= 20; player.review -= 0.2; return t('mediaFeature'); } }),
          new Event({ label: t('regulationWarning'), text: t('regulationWarningText'), chance: 0.1, effect: (player) => { player.regulation += 8; return t('regulationWarning'); } }),
          new Event({ label: t('appRating'), text: t('appRatingText'), chance: 0.12, effect: (player) => { player.review -= 0.3; player.users -= 15; return t('appRating'); } }),
        ];
      }

      init() {
        this.topStats = document.getElementById('topStats');
        this.appliedElements = document.getElementById('appliedElements');
        this.optionContainer = document.getElementById('optionContainer');
        this.rightStats = document.getElementById('rightStats');
        this.logContainer = document.getElementById('logContainer');
        this.abOverlay = document.getElementById('abOverlay');
        this.abCard = document.getElementById('abCard');
        this.messageOverlay = document.getElementById('messageOverlay');
        this.messageCard = document.getElementById('messageCard');
        this.currentPair = this.choosePair();
        this.render();
        this.addLog(t('gameStart'), t('gameStartNote'));
      }

      choosePair() {
        const pool = this.availableOptions.length >= 2 ? [...this.availableOptions] : [...this.options];
        const firstIndex = Math.floor(Math.random() * pool.length);
        const first = pool.splice(firstIndex, 1)[0];
        const secondIndex = Math.floor(Math.random() * pool.length);
        const second = pool.splice(secondIndex, 1)[0];
        return [first, second];
      }

      render() {
        this.renderTopStats();
        this.renderOptions();
        this.renderRightStats();
        this.renderAppliedList();
      }

      renderTopStats() {
        if (!this.topStats) return;
        const p = this.player;
        const items = [
          { label: t('profit'), value: `${t('profitUnit')}${p.profit}` },
          { label: t('trust'), value: `${p.trust}` },
          { label: t('review'), value: `${p.review.toFixed(1)}` },
          { label: t('users'), value: `${p.users}` },
          { label: t('flameRisk'), value: `${p.flame}` },
          { label: t('regulationRisk'), value: `${p.regulation}` },
          { label: t('turn'), value: `${p.turn}` },
        ];
        this.topStats.innerHTML = items.map(item => `
          <div class="stat-pill">
            <strong>${item.label}</strong>
            <div class="value">${item.value}</div>
          </div>
        `).join('');
      }

      renderOptions() {
        if (!this.optionContainer) return;
        this.optionContainer.innerHTML = this.currentPair.map((option, index) => {
          const previewState = this.currentUI.clone();
          previewState.applyOption(option);
          const mode = index === 0 ? 'clear' : 'soft';
          return `
            <div class="option-card" onclick="game.handleOptionSelected(${index})" tabindex="0">
              <div class="option-title">${index === 0 ? t('choice1') : t('choice2')}: ${option.title}</div>
              <p class="option-desc">${option.description}</p>
              <div class="sim-panel">${this.renderUIState(previewState, [option.highlightKey], mode)}</div>
              <div class="option-actions">
                <div class="hint">${t('selectChoice')}</div>
                <div style="display:flex; align-items:center; gap:10px; color:#94a3b8;">A: ${this.currentPair[0].cvr} / B: ${this.currentPair[1].cvr}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      renderRightStats() {
        if (!this.rightStats) return;
        const p = this.player;
        this.rightStats.innerHTML = `
          <div class="small-stat"><label>${t('profit')}</label><div class="value">${t('profitUnit')}${p.profit}</div></div>
          <div class="small-stat"><label>${t('trust')}</label><div class="value">${p.trust}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, p.trust)}%"></div></div></div>
          <div class="small-stat"><label>${t('review')}</label><div class="value">${p.review.toFixed(1)}</div></div>
          <div class="small-stat"><label>${t('users')}</label><div class="value">${p.users}</div></div>
          <div class="small-stat"><label>${t('flameRisk')}</label><div class="value">${p.flameEvents}</div></div>
          <div class="small-stat"><label>${t('regulationRisk')}</label><div class="value">${p.regulation}</div></div>
        `;
      }

      renderAppliedList() {
        this.appliedElements.innerHTML = this.appliedOptions.length > 0
          ? this.appliedOptions.map(id => {
              const opt = this.options.find(o => o.id === id);
              return `<li>${opt ? opt.title : id}</li>`;
            }).join('')
          : `<li>${t('noChanges')}</li>`;
      }

      renderUIState(state, highlightKeys, mode = 'clear') {
        const isClear = mode === 'clear';
        const products = [
          { title: '限定セット', price: `${t('profitUnit')}39.80`, badge: t('flameRisk') },
          { title: 'フルスペック版', price: `${t('profitUnit')}59.80`, badge: t('users') },
          { title: 'お試しプラン', price: `${t('profitUnit')}19.80`, badge: t('profit') },
        ];
        const productMarkup = (product, index) => `
          <div class="selection-item">
            <div class="item-thumb">${index + 1}</div>
            <div class="item-body">
              <div class="item-name">${product.title}</div>
              <div class="item-price">${product.price}</div>
            </div>
            <button class="select-pill">${t('select')}</button>
          </div>
        `;
        const adMarkup = `
          <div class="ad-slot ${isClear ? 'mode-clear' : 'mode-soft'}">
            <div class="ad-badge">${t('adTag')}</div>
            <div class="ad-copy">${t('discountBadge')}</div>
            <div class="ad-note">${t('limited')}</div>
          </div>
        `;
        const listMarkup = `${productMarkup(products[0], 0)}${adMarkup}${productMarkup(products[1], 1)}${productMarkup(products[2], 2)}`;

        return `
          <div class="selection-page ${isClear ? 'mode-clear' : 'mode-soft'}">
            <div class="selection-top">
              <div>${t('productSelection')}</div>
              <div>${t('recommendedTag')}</div>
            </div>
            <div class="selection-list">
              ${listMarkup}
            </div>
          </div>
        `;
      }

      handleOptionSelected(index) {
        if (this.isBusy || this.isGameOver()) return;
        this.isBusy = true;
        const chosenOption = this.currentPair[index];
        this.showABTest(chosenOption, index);
      }

      showABTest(chosen, chosenIndex) {
        this.abOverlay.classList.remove('hidden');
        this.abCard.innerHTML = `
          <div class="ab-title">${t('abTestResult')}</div>
          <div class="ab-grid">
            <div class="ab-card"><h3>A${t('choice1')}</h3><p>${this.currentPair[0].title}</p><p>CVR ${this.currentPair[0].cvr}</p></div>
            <div class="ab-card"><h3>B${t('choice2')}</h3><p>${this.currentPair[1].title}</p><p>CVR ${this.currentPair[1].cvr}</p></div>
          </div>
          <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center; gap:14px;">
            <div class="winner">${t('winner')}${parseFloat(this.currentPair[0].cvr) > parseFloat(this.currentPair[1].cvr) ? t('versionA') : t('versionB')}</div>
            <div style="color:#475569;">${t('yourChoice')}${chosenIndex === 0 ? t('choice1') : t('choice2')}</div>
          </div>
          <div style="margin-top:20px; display:flex; gap:12px;"><button class="button secondary" id="skipButton">${t('confirmResult')}</button></div>
        `;
        const skipButton = document.getElementById('skipButton');
        skipButton.addEventListener('click', () => {
          this.abOverlay.classList.add('hidden');
          this.applySelectedOption(chosen);
        });
        setTimeout(() => {
          if (!this.abOverlay.classList.contains('hidden')) {
            this.abOverlay.classList.add('hidden');
            this.applySelectedOption(chosen);
          }
        }, 2400);
      }

      applySelectedOption(option) {
        this.currentUI.applyOption(option);
        this.appliedOptions.push(option.id);
        this.availableOptions = this.availableOptions.filter(o => o.id !== option.id);
        const previousProfit = this.player.profit;
        const previousTrust = this.player.trust;
        this.player.applyCard(option);
        const longTerm = this.player.applyLongTerm();
        this.player.pushHistory();
        this.render();
        this.addLog(option.title, `${t('adoptionLog')}${option.description}${t('shortTermProfit')}${option.profit}${t('trustChange')}${option.trust > 0 ? '+' : ''}${option.trust}${t('longTermEffect')}${longTerm.userDelta >= 0 ? '+' : ''}${longTerm.userDelta}${t('profitDecline')}${Math.round(longTerm.longTermProfit)}.`);
        this.handleRandomEvent();
        this.player.turn += 1;
        this.currentPair = this.choosePair();
        this.render();
        this.isBusy = false;
        if (this.isGameOver()) {
          this.showGameOver();
        }
      }

      handleRandomEvent() {
        const chance = Math.random();
        const event = this.events.find(e => chance < e.chance);
        if (!event) return;
        const message = event.effect(this.player);
        this.player.clampStats();
        this.addLog(event.label, `${event.text} ${message}`);
        this.showMessage(event.label, event.text);
      }

      addLog(title, text) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>${title}</strong><div>${text}</div>`;
        this.logContainer.prepend(entry);
        while (this.logContainer.children.length > 7) {
          this.logContainer.removeChild(this.logContainer.lastChild);
        }
      }

      showMessage(title, text) {
        this.messageCard.innerHTML = `
          <h3>${title}</h3>
          <p>${text}</p>
          <button class="button primary" id="closeMessage">${t('close')}</button>
        `;
        this.messageOverlay.classList.remove('hidden');
        document.getElementById('closeMessage').addEventListener('click', () => {
          this.messageOverlay.classList.add('hidden');
        });
      }

      isGameOver() {
        return this.player.trust <= 0 || this.player.users < 100 || this.player.regulation >= 100;
      }

      showGameOver() {
        const initialUIHtml = this.renderUIState(this.initialUI, []);
        const finalUIHtml = this.renderUIState(this.currentUI, []);
        const appliedList = this.appliedOptions.length > 0
          ? this.appliedOptions.map(id => {
              const opt = this.options.find(o => o.id === id);
              return `<li>${opt ? opt.title : id}</li>`;
            }).join('')
          : `<li>${t('noChanges')}</li>`;
        const historyTable = this.player.history.map(entry => `<li>${t('turn')} ${entry.turn}: ${t('profit')} ${t('profitUnit')}${entry.profit}, ${t('trust')} ${entry.trust}, ${t('users')} ${entry.users}, ${t('review')} ${entry.review.toFixed(1)}, ${t('flameRisk')} ${entry.flame}</li>`).join('');
        this.messageCard.innerHTML = `
          <h3>${t('gameOverTitle')}</h3>
          <p>${t('gameOverNote')}</p>
          <div class="summary-grid">
            <div class="summary-card"><h4>${t('initialUI')}</h4>${initialUIHtml}</div>
            <div class="summary-card"><h4>${t('finalUI')}</h4>${finalUIHtml}</div>
          </div>
          <div class="summary-card">
            <h4>${t('appliedElementsLabel')}</h4>
            <ul class="summary-list">${appliedList}</ul>
          </div>
          <div class="summary-card">
            <h4>${t('transitions')}</h4>
            <ul class="summary-list">${historyTable}</ul>
          </div>
          <button class="button primary" id="restartButton">${t('retryGame')}</button>
        `;
        this.messageOverlay.classList.remove('hidden');
        document.getElementById('restartButton').addEventListener('click', () => {
          this.reset();
          this.messageOverlay.classList.add('hidden');
        });
      }

      reset() {
        this.player = new Player();
        this.currentUI = new UIState();
        this.initialUI = this.currentUI.clone();
        this.availableOptions = [...this.options];
        this.appliedOptions = [];
        this.currentPair = this.choosePair();
        this.logContainer.innerHTML = '';
        this.render();
        this.addLog(t('gameRestart'), t('gameRestartNote'));
        this.isBusy = false;
      }
    }

    const game = new Game();
    initLanguageButtons();
    // Apply saved/initial language to update all texts
    setLanguage(currentLanguage);
  </script>
</body>
</html>
