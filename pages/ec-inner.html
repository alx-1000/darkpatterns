<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Preview Standalone</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/ec.css" />
</head>
<body class="ec-page ec-inner-page">
  <main class="standalone-shell">
    <aside class="preview-controls" aria-label="プレビュー設定">
      <h1>分岐プレビュー</h1>
      <label><input type="checkbox" id="discountToggle" /> 今だけ 15%OFF</label>
      <label><input type="checkbox" id="timerToggle" /> カウントダウンタイマー</label>
      <label><input type="checkbox" id="purchaseNoticeToggle" /> 購入通知</label>
      <label><input type="checkbox" id="subscriptionSwitchToggle" /> 定期便切替</label>
      <label><input type="checkbox" id="intrusiveAdToggle" /> 邪魔な広告</label>
    </aside>

    <section class="branch-preview" id="branchPreview" aria-label="分岐プレビュー"></section>
  </main>

  <script>
    const text = {
      subscriptionTag: '定期便',
      normalPurchaseTag: '通常購入',
      adTag: '広告',
      productName: 'プレミアムセット',
      normalPrice: '3,980円',
      originalPrice: '通常 4,680円',
      discountBadge: '今だけ 15%OFF',
      purchaseButton: '今すぐ購入',
      purchaseModeSubscription: '定期便',
      purchaseModeOneTime: '一回限り',
      purchaseModeAutoRevert: '10秒後に定期便へ戻ります',
      socialProofBadge: '購入通知',
      socialProofSubtext: '売り切れ寸前！',
      intrusiveAdLabel: '広告',
      intrusiveAdCopy: '今だけ会員限定の特別オファー',
      intrusiveAdNote: '会員限定',
    };

    const branchState = {
      subscription: 'subscription',
      price: 'original',
      ad: 'distinct',
      timer: 'off',
      purchaseNotice: false,
      subscriptionSwitch: false,
      intrusiveAd: false,
    };

    const branchPreview = document.getElementById('branchPreview');
    let countdownSeconds = 5 * 60;
    let countdownTimerId = null;

    function formatCountdown(seconds) {
      const safeSeconds = Math.max(0, seconds);
      const minutes = Math.floor(safeSeconds / 60);
      const remainingSeconds = safeSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
    }

    function stopCountdown(reset = false) {
      if (countdownTimerId !== null) {
        clearInterval(countdownTimerId);
        countdownTimerId = null;
      }
      if (reset) {
        countdownSeconds = 5 * 60;
      }
    }

    function renderBranchPreview() {
      const subscriptionText = branchState.subscription === 'subscription'
        ? '⚠︎ 月1回の定期便です / 毎月15日に引き落とし'
        : '一回限りの購入';
      const timerText = branchState.timer === 'on' ? formatCountdown(countdownSeconds) : '';

      if (branchState.timer === 'on') {
        if (countdownTimerId === null) {
          countdownTimerId = setInterval(() => {
            countdownSeconds = countdownSeconds > 0 ? countdownSeconds - 1 : 0;
            renderBranchPreview();
          }, 1000);
        }
      } else {
        stopCountdown(true);
      }

      const subscriptionMarkup = branchState.subscriptionSwitch ? `
        <div class="subscription-widget-shell" data-role="subscription-widget">
          <button type="button" class="subscription-callout" aria-label="定期便の表示を切り替える">
            <span class="subscription-change-mark">⇄</span>
            <span class="subscription-callout-text">${subscriptionText}</span>
          </button>
        </div>
      ` : '';

      const purchaseModeMarkup = branchState.subscriptionSwitch ? `
        <div class="purchase-mode-switch" role="group" aria-label="購入方法の切り替え">
          <button type="button" class="purchase-mode-button ${branchState.subscription === 'subscription' ? 'active' : ''}" data-purchase-mode="subscription">
            <span class="purchase-mode-dot">◎</span>
            <span>${text.purchaseModeSubscription}</span>
          </button>
          <button type="button" class="purchase-mode-button ${branchState.subscription === 'one-time' ? 'active' : ''}" data-purchase-mode="one-time">
            <span class="purchase-mode-dot">◎</span>
            <span>${text.purchaseModeOneTime}</span>
          </button>
        </div>
        <div class="purchase-mode-note ${branchState.subscription === 'one-time' ? 'visible' : ''}">
          ${branchState.subscription === 'one-time' ? text.purchaseModeAutoRevert : '&nbsp;'}
        </div>
      ` : '';

      const todayPurchasedCount = 108
        + (branchState.purchaseNotice ? 58 : 0)
        + (branchState.subscriptionSwitch ? 42 : 0)
        + (branchState.subscriptionSwitch && branchState.subscription === 'one-time' ? 16 : 0)
        + (branchState.intrusiveAd ? 30 : 0)
        + (branchState.price === 'discount' ? 10 : 0)
        + (branchState.timer === 'on' ? 8 : 0);

      const socialProofMarkup = branchState.purchaseNotice ? `
        <div class="social-proof-popup" aria-label="購入者数の通知">
          <div class="social-proof-badge">${text.socialProofBadge}</div>
          <div class="social-proof-text">今日 ${todayPurchasedCount} 人が購入しました！</div>
          <div class="social-proof-subtext">${text.socialProofSubtext}</div>
        </div>
      ` : '';

      const adBannerMarkup = branchState.intrusiveAd ? `
        <div class="intrusive-ad-banner">
          <div class="intrusive-ad-label">${text.intrusiveAdLabel}</div>
          <div class="intrusive-ad-copy">${text.intrusiveAdCopy}</div>
          <div class="intrusive-ad-note">${text.intrusiveAdNote}</div>
        </div>
      ` : '';

      const timerInlineMarkup = branchState.timer === 'on'
        ? `<span class="timer-inline" data-role="timer-widget">
            <span>⏱</span>
            <span>この価格で買えるのは残り ${timerText || '05:00'}</span>
          </span>`
        : '';

      const discountInlineMarkup = branchState.price === 'discount'
        ? `<div class="promo-badge discount-inline" data-role="discount-widget">
            <span>🏷</span>
            <span>${text.discountBadge}</span>
          </div>`
        : '';

      branchPreview.innerHTML = `
        <div class="branch-preview-card">
          ${socialProofMarkup}
          <div class="preview-top">
            <span class="preview-tag">${branchState.subscription === 'subscription' ? text.subscriptionTag : text.normalPurchaseTag}</span>
            <span class="preview-subtle">${text.adTag}</span>
          </div>
          <h3 class="product-title">${text.productName}</h3>
          <div class="price-row">
            <span class="price-main">${text.normalPrice}</span>
            ${branchState.price === 'discount' ? `<span class="price-original">${text.originalPrice}</span>` : ''}
            ${discountInlineMarkup}
            ${timerInlineMarkup}
          </div>
          ${adBannerMarkup}
          ${purchaseModeMarkup}
          ${subscriptionMarkup}
          <div class="promo-badges"></div>
          <button class="preview-cta">${text.purchaseButton}</button>
        </div>
      `;
    }

    function bindToggle(id, update) {
      document.getElementById(id).addEventListener('change', (event) => {
        update(event.target.checked);
        renderBranchPreview();
      });
    }

    bindToggle('discountToggle', (checked) => {
      branchState.price = checked ? 'discount' : 'original';
    });

    bindToggle('timerToggle', (checked) => {
      branchState.timer = checked ? 'on' : 'off';
    });

    bindToggle('purchaseNoticeToggle', (checked) => {
      branchState.purchaseNotice = checked;
    });

    bindToggle('subscriptionSwitchToggle', (checked) => {
      branchState.subscriptionSwitch = checked;
      if (!checked) {
        branchState.subscription = 'subscription';
      }
    });

    bindToggle('intrusiveAdToggle', (checked) => {
      branchState.intrusiveAd = checked;
    });

    branchPreview.addEventListener('click', (event) => {
      const purchaseModeButton = event.target.closest('[data-purchase-mode]');
      if (!purchaseModeButton) {
        return;
      }
      branchState.subscription = purchaseModeButton.dataset.purchaseMode;
      renderBranchPreview();
    });

    renderBranchPreview();
  </script>
</body>
</html>
