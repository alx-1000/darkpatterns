<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Pattern Simulator | EC編</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/scenario.css" />
  <link rel="stylesheet" href="../css/ec.css" />
</head>
<body class="scenario-page ec-page">
    <header class="scenario-header">
      <h1 data-text="scenarioTitle">EC編</h1>
      <a class="scenario-home-link" href="../index.html">トップページへ</a>
    </header>
    <section class="panel branch-panel">
      <div class="branch-layout">
        <div class="branch-left">
          <div class="branch-card">
            <h3 data-text="timerLabel">4. カウントダウンタイマー / 15% オフ</h3>
            <p class="timer-drop-hint">ドラッグしてプレビューに置いてください。</p>
            <div id="timerDraggable" class="timer-drag-item timer-placement" data-kind="timer" draggable="true">
              <span>⏱</span>
              <span>この価格で買えるのは残り 05:00</span>
            </div>
            <div id="discountDraggable" class="timer-drag-item timer-placement" data-kind="discount" draggable="true">
              <span>🏷</span>
              <span>今だけ 15%OFF</span>
            </div>
            
            <div id="purchaseNoticeDraggable" class="timer-drag-item timer-placement" data-kind="purchaseNotice" draggable="true">
              <span>🔔</span>
              <span>今日◯◯人が購入しました！</span>
            </div>
            <div id="subscriptionSwitchDraggable" class="timer-drag-item timer-placement" data-kind="subscriptionSwitch" draggable="true">
              <span>◎</span>
              <span>定期便 / 一回限りの切替</span>
            </div>
            <div id="intrusiveAdDraggable" class="timer-drag-item timer-placement" data-kind="intrusiveAd" draggable="true">
              <span>📢</span>
              <span>邪魔な広告を表示する</span>
            </div>
          </div>
        </div>
        <div class="branch-center">
          <div class="branch-preview" id="branchPreview"></div>
        </div>
        <div class="branch-right">
          <div class="branch-score">
            <button type="button" class="finish-button" id="finishMetricsButton" data-text="finishMetrics">完成</button>
            <div class="branch-metrics-content" id="branchMetricsContent">
              <h3 data-text="predictionTitle">スコア予測</h3>
              <div class="branch-chart" id="branchChart"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  <div class="overlay hidden" id="abOverlay">
    <div class="modal-card" id="abCard"></div>
  </div>
  <div class="overlay hidden" id="messageOverlay">
    <div class="message-card" id="messageCard"></div>
  </div>
  <div class="overlay hidden" id="metricsOverlay">
    <div class="modal-card result-modal">
      <div class="metric-modal-head">
        <h3>Result</h3>
        <button type="button" class="button secondary" id="closeMetricsButton">閉じる</button>
      </div>
      <div id="metricsPopupContent"></div>
    </div>
  </div>

  <!--
     <div class="language-toggle">
        <button class="lang-btn active" data-lang="ja">JP</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
  -->

  <script src="../js/i18n.js"></script>
  <script src="../js/branch.js"></script>
  <script src="../js/game.js"></script>
</body>
</html>
