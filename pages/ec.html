<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Pattern Simulator | EC編</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/ec.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kosugi+Maru&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

  
</head>
<body class="scenario-page">
  <div class="branch-shell">
    <header class="scenario-header">
      <h1 data-text="scenarioTitle">ネットショッピング編</h1>
      <a class="scenario-home-link" href="../index.html">トップページへ</a>
    </header>
    <section class="panel branch-panel">
      <div class="branch-layout">
        <div class="branch-left">
          <div class="branch-card">
            <h2>カスタマイズ</h2>

            <section>オプション1: 誇大表示</section>
            <div id="timerDraggable" class="item" back data-kind="timer" draggable="true">
              <div class="custom-preview">
                <h4 style="color: #333;">35Lの超巨大冷蔵庫!!</h4>
              </div>
            </div>

            <section>オプション2: 嘘の割引表示</section>
            <div id="discountDraggable" class="item" background="white" data-kind="discount" draggable="true">
              <img src="../assets/images/discount.png"  height="100" style="background: white;" alt="割引バッジ" />
            </div>
            
            <section>オプション3: Saleバナー</section>
            <div id="saleBadgeDraggable" class="item" data-kind="saleBadge" draggable="true">
              <div class="sale-badge" >
                <p> SALE! SALE! SALE! </p> 
              </div>
            </div>

            <section>オプション4: チェックボックス</section>
            <div id="subscriptionSwitchDraggable" class="item" data-kind="subscriptionSwitch" draggable="true">
              <label class="option-mini-check">
                <div></div>
                <input type="checkbox" checked />
                <span>お知らせを希望する</span>
              </label>
            </div>

            <section>オプション5: 利用規約</section>
            <div id="termsDraggable" class="item" data-kind="terms" draggable="true">
              <div>利用規約</div>
              <label class="option-mini-check">
                <input type="checkbox" checked />
                <span>同意します</span>
              </label>
            </div>
          </div>
        </div>


        <div class="branch-center">
          <div class="branch-preview" id="branchPreview"></div>
        </div>


        <div class="branch-right">
          <div class="branch-score">
            <div class="branch-metrics-content" id="branchMetricsContent">
              <h3 data-text="predictionTitle">スコア予測</h3>
              <div class="branch-chart" id="branchChart"></div>
              <button type="button" class="finish-button" id="finishMetricsButton" data-text="finishMetrics">完成</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="overlay hidden" id="abOverlay">
    <div class="modal-card" id="abCard"></div>
  </div>
  <div class="overlay hidden" id="messageOverlay">
    <div class="message-card" id="messageCard"></div>
  </div>
  <div class="overlay hidden" id="metricsOverlay">
    <div class="modal-card result-modal">
      <div class="metric-modal-head">
        <h3>Result</h3>
        <button type="button" class="button secondary" id="closeMetricsButton">閉じる</button>
      </div>
      <div id="metricsPopupContent"></div>
    </div>
  </div>

  <!--
     <div class="language-toggle">
        <button class="lang-btn active" data-lang="ja">JP</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
  -->

  <script src="../js/i18n.js"></script>
  <script src="../js/branch.js"></script>
  <script src="../js/game.js"></script>
</body>
</html>
